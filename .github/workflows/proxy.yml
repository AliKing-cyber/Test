name: Covert Proxy
on:
  workflow_dispatch:
jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl
      - name: Fetch target
        env:
          REQUEST_FILE: request.json
          RESPONSE_FILE: response.json
        run: |
          if [ -f "$REQUEST_FILE" ]; then
            TARGET=$(jq -r .url < "$REQUEST_FILE")
            echo "Fetching: $TARGET"
            HTTP_CODE=$(curl -s -o response_body.txt -w "%{http_code}" --max-time 30 "$TARGET")
            echo "{\"url\":\"$TARGET\",\"status\":\"$HTTP_CODE\",\"body_sha256\":\"$(sha256sum response_body.txt | cut -d" " -f1)\"}" > "$RESPONSE_FILE"
            # Base64 encode the body to avoid newline/escape issues
            echo -n "base64_body=" >> "$RESPONSE_FILE"
            base64 -w0 response_body.txt >> "$RESPONSE_FILE"
          else
            echo "{\"error\":\"No request.json found\"}" > "$RESPONSE_FILE"
          fi
      - name: Commit & push response
        run: |
          git config user.name "CovertBot"
          git config user.email "bot@covert.io"
          git add response.json
          git commit -m "Auto-response from proxy" || echo "Nothing to commit"
          git push origin main
